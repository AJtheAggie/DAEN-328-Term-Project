services:

  db:
    image: postgres:15
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python extract.py && python transform.py && python load.py"
    restart: on-failure

  streamlit:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
      etl:
        condition: service_completed_successfully
    command: >
      streamlit run streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0

volumes:
  pgdata: